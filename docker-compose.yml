version: "3.9"

services:

  # ── MongoDB Database ────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: taskflow_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-adminpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-vendor_to_do}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - taskflow_net

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-adminpassword}@mongo:27017
      MONGODB_DB_NAME: ${MONGO_DB:-vendor_to_do}
      DEBUG: "false"
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - taskflow_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── React Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - taskflow_net

volumes:
  mongo_data:
    driver: local

networks:
  taskflow_net:
    driver: bridge
